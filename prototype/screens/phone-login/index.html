<body class="bg-surface font-body-md text-on-surface min-h-screen flex flex-col">
<!-- App Bar (Logo only for Onboarding) -->
<header class="flex justify-center items-center py-xl">
<h1 class="font-display-lg text-display-lg text-primary tracking-tight">PlayPoint</h1>
</header>
<main class="flex-grow flex flex-col px-container-margin">
<!-- Hero Illustration Area -->
<div class="relative w-full h-48 mb-xl flex items-center justify-center overflow-hidden rounded-xl">
<!-- Animated Background Shader Component -->

<div class="relative z-10 flex flex-col items-center">
<div class="w-24 h-24 bg-surface-container-lowest rounded-xl shadow-[0_2px_8px_0_rgba(0,0,0,0.05)] flex items-center justify-center mb-sm">
<span class="material-symbols-outlined text-[48px] text-primary" style="font-variation-settings: 'FILL' 1;">smartphone</span>
</div>
</div>
</div>
<!-- Content Section -->
<div class="w-full max-w-md mx-auto">
<h2 class="font-headline-lg-mobile text-headline-lg-mobile mb-xs text-on-surface">შედი PlayPoint-ში</h2>
<p class="font-body-md text-body-md text-on-surface-variant mb-xl">შეიყვანე შენი მობილურის ნომერი გასაგრძელებლად</p>
<!-- Phone Input Component -->
<div class="space-y-md">
<div class="flex gap-sm">
<!-- Country Code Selector -->
<div class="relative flex items-center bg-surface-container-low rounded-lg px-md h-[56px] border border-transparent focus-within:border-primary input-transition">
<span class="font-body-md text-on-surface">+995</span>
<span class="material-symbols-outlined ml-xs text-on-surface-variant text-[20px]">keyboard_arrow_down</span>
</div>
<!-- Main Input -->
<div class="flex-grow relative">
<input class="w-full h-[56px] bg-surface-container-low border-transparent rounded-lg px-md font-body-md text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary focus:border-transparent input-transition outline-none" maxlength="12" placeholder="5XX XX XX XX" type="tel"/>
</div>
</div>
<!-- Primary Action Button -->
<button class="w-full h-[48px] bg-primary text-on-primary font-headline-lg-mobile rounded-lg shadow-[0_4px_12px_0_rgba(70,72,212,0.15)] active-scale transition-all duration-150 mt-sm">
                    გაგრძელება
                </button>
</div>
</div>
<!-- Social/Alternative Section -->
<div class="mt-xl text-center">
<div class="flex items-center gap-sm mb-lg">
<div class="h-[1px] flex-grow bg-outline-variant"></div>
<span class="font-label-sm text-label-sm text-outline">ან გამოიყენე</span>
<div class="h-[1px] flex-grow bg-outline-variant"></div>
</div>
<div class="flex justify-center gap-md">
<button class="w-14 h-14 bg-surface-container-lowest border border-outline-variant rounded-xl flex items-center justify-center active-scale transition-transform">

<a class="text-primary hover:underline" href="#">წესებს და პირობებს</a> და

<script>
        // Simple Micro-interaction for input highlight
        const phoneInput = document.querySelector('input[type="tel"]');
        const inputWrapper = phoneInput.parentElement;

        phoneInput.addEventListener('focus', () => {
            inputWrapper.classList.add('scale-[1.02]');
        });

        phoneInput.addEventListener('blur', () => {
            inputWrapper.classList.remove('scale-[1.02]');
        });

        // Numeric entry restriction
        phoneInput.addEventListener('input', (e) => {
            e.target.value = e.target.value.replace(/[^0-9]/g, '');
        });
    </script>
