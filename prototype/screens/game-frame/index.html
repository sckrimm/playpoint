<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .fill-icon {
            font-variation-settings: 'FILL' 1;
        }
        body {
            overscroll-behavior-y: contain;
        }
        .glass-tag {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        /* Custom animation for the score jump */
        @keyframes score-pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }
        .animate-score {
            animation: score-pop 0.3s ease-out;
        }

<body class="bg-background text-on-background font-body-md min-h-screen flex flex-col overflow-hidden">
<!-- Top Navigation Shell (The Anchor) -->
<!-- Applying Shared Component Logic: TopAppBar style_shell_layout & style_bg_color -->
<header class="flex justify-between items-center w-full px-container-margin py-md bg-surface dark:bg-inverse-surface shadow-[0_2px_8px_0_rgba(0,0,0,0.05)] z-50">
<div class="flex items-center gap-sm">
<button class="p-xs rounded-full hover:bg-surface-variant/50 transition-colors active:scale-95 duration-150 flex items-center justify-center" onclick="window.history.back()">
<span class="material-symbols-outlined text-primary text-[28px]">arrow_back_ios_new</span>
</button>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-primary tracking-tight">სნეიკი</h1>
</div>
<div class="flex items-center gap-md">
<!-- Score Display -->
<div class="flex flex-col items-end">
<span class="text-label-sm font-label-sm text-on-surface-variant leading-none">ქულა</span>
<span class="font-score-md text-score-md text-primary-container" id="score">1,240</span>
</div>
<!-- Timer Display -->
<div class="flex items-center gap-xs bg-secondary-container px-sm py-xs rounded-xl shadow-sm">
<span class="material-symbols-outlined text-on-secondary-container text-md">timer</span>
<span class="font-score-md text-score-md text-on-secondary-container" id="timer">02:45</span>
</div>
</div>
</header>
<!-- Main Game Area (Iframe Canvas) -->

<!-- Background Atmospheric Element -->

</div>
<!-- The Game Iframe Placeholder -->

<!-- Simulated Iframe Content -->
<div class="w-full h-full max-w-4xl mx-auto shadow-2xl relative bg-black overflow-hidden md:rounded-xl md:my-lg md:h-[calc(100%-48px)]">

<!-- Immersive Overlay Elements -->
<div class="absolute top-md right-md flex flex-col gap-xs">
<button class="bg-surface-container-lowest/20 backdrop-blur-md p-sm rounded-full text-white hover:bg-white/30 transition-all">
<span class="material-symbols-outlined">pause</span>
</button>
<button class="bg-surface-container-lowest/20 backdrop-blur-md p-sm rounded-full text-white hover:bg-white/30 transition-all">

</div>

<!-- Bottom Navigation Suppressed as per Task-Focused/Linear Journey Rule -->
<script>
        // Simple Micro-interactions for the Game Screen
        
        // Timer Logic
        let seconds = 165; // 2:45
        const timerEl = document.getElementById('timer');
        
        setInterval(() => {
            seconds++;
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            timerEl.innerText = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }, 1000);

        // Score Simulation
        const scoreEl = document.getElementById('score');
        let currentScore = 1240;

        function incrementScore() {
            const added = Math.floor(Math.random() * 50) + 10;
            currentScore += added;
            scoreEl.innerText = currentScore.toLocaleString();
            
            // Visual feedback
            scoreEl.classList.add('animate-score');
            setTimeout(() => {
                scoreEl.classList.remove('animate-score');
            }, 300);
        }

        // Simulating random score jumps
        setInterval(() => {
            if (Math.random() > 0.7) incrementScore();
        }, 3000);

        // Prevent accidental gestures in the "Iframe" area
        document.querySelector('main').addEventListener('touchmove', (e) => {
            if (e.target.closest('main')) {
                // Keep the "game" focused
            }
        }, { passive: false });
    </script>
