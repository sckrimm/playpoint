<!-- Bottom Navigation Suppressed (Task-Focused Screen) -->
<script>
        // OTP Auto-focus Logic
        const inputs = document.querySelectorAll('#otp-container input');
        
        inputs.forEach((input, index) => {
            input.addEventListener('input', (e) => {
                if (e.target.value.length === 1 && index < inputs.length - 1) {
                    inputs[index + 1].focus();
                }
            });

            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && !e.target.value && index > 0) {
                    inputs[index - 1].focus();
                }
            });

            // Prevent non-numeric
            input.addEventListener('keypress', (e) => {
                if (!/[0-9]/.test(e.key)) {
                    e.preventDefault();
                }
            });
        });

        // Simple Timer Logic
        let timeLeft = 119; // 1:59
        const timerDisplay = document.getElementById('timer-display');
        const resendBtn = document.getElementById('resend-btn');

        const countdown = setInterval(() => {
            if (timeLeft <= 0) {
                clearInterval(countdown);
                timerDisplay.textContent = "00:00";
                resendBtn.disabled = false;
                return;
            }
            timeLeft--;
            const minutes = Math.floor(timeLeft / 60);
            const seconds = timeLeft % 60;
            timerDisplay.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        }, 1000);

        // Success Haptic Simulation (Optional Micro-interaction)
        document.querySelector('button.bg-primary').addEventListener('click', function() {
            const btn = this;
            const originalText = btn.textContent;
            btn.innerHTML = `<span class="material-symbols-outlined animate-spin">refresh</span>`;
            
            setTimeout(() => {
                btn.innerHTML = `<span class="material-symbols-outlined">check_circle</span>`;
                btn.classList.replace('bg-primary', 'bg-secondary');
            }, 1200);
        });
    </script>
