<script>
        // Simple micro-interaction for tab switching simulation
        const buttons = document.querySelectorAll('.bg-surface-container button');
        buttons.forEach(btn => {
            btn.addEventListener('click', () => {
                buttons.forEach(b => {
                    b.classList.remove('bg-surface-container-lowest', 'text-primary', 'shadow-sm');
                    b.classList.add('text-on-surface-variant');
                });
                btn.classList.add('bg-surface-container-lowest', 'text-primary', 'shadow-sm');
                btn.classList.remove('text-on-surface-variant');
            });
        });

        // Add a slight tilt effect to podium cards on hover for a "gaming" feel
        const podiumCards = document.querySelectorAll('.podium-card');
        podiumCards.forEach(card => {
            card.addEventListener('mousemove', (e) => {
                const rect = card.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const centerX = rect.width / 2;
                const rotateY = (x - centerX) / 10;
                card.style.transform = `perspective(1000px) rotateY(${rotateY}deg)`;
            });
            card.addEventListener('mouseleave', () => {
                card.style.transform = `perspective(1000px) rotateY(0deg)`;
            });
        });
    </script>
