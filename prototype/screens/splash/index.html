<style>
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        @keyframes pulse-soft {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.8; }
        }
        .float-animation { animation: float 4s ease-in-out infinite; }
        .pulse-animation { animation: pulse-soft 3s ease-in-out infinite; }
        
        body {
            background-color: #f9f9f9;
            overflow: hidden;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        .logo-gradient {
            background: linear-gradient(135deg, #4648d4 0%, #6063ee 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Ambient glow for the 2D flat-plus look */
        .ambient-glow {
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(70, 72, 212, 0.1) 0%, rgba(255, 255, 255, 0) 70%);
            z-index: -1;
            border-radius: 9999px;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="flex flex-col items-center justify-center min-h-screen relative">
<!-- Atmospheric Visual Layer -->
<div class="ambient-glow top-1/4 -left-20 pulse-animation"></div>
<div class="ambient-glow bottom-1/4 -right-20 pulse-animation" style="animation-delay: 1.5s;"></div>
<!-- Main Content Container -->
<main class="flex flex-col items-center justify-center px-container-margin z-10">
<!-- Animated Logo Group -->
<div class="relative mb-lg flex flex-col items-center float-animation">
<!-- Icon Symbol -->
<div class="w-32 h-32 md:w-40 md:h-40 bg-primary-container rounded-3xl shadow-[0_12px_24px_rgba(70,72,212,0.2)] flex items-center justify-center mb-md transform rotate-3 hover:rotate-0 transition-transform duration-500">
<span class="material-symbols-outlined text-[64px] md:text-[80px] text-on-primary-container" data-icon="sports_esports" style="font-variation-settings: 'FILL' 1;">sports_esports</span>
</div>
<!-- Brand Text -->
<h1 class="font-display-lg text-display-lg tracking-tight logo-gradient">
                PlayPoint
            </h1>
</div>
<!-- Tagline -->
<div class="text-center">
<p class="font-headline-lg-mobile text-headline-lg-mobile md:font-headline-lg md:text-headline-lg text-on-surface-variant max-w-[280px] md:max-w-none">
                ითამაშე, დააგროვე, მოიგე
            </p>
</div>
<!-- Loading Indicator -->
<div class="mt-xl flex items-center gap-xs">
<div class="w-3 h-3 rounded-full bg-primary pulse-animation"></div>
<div class="w-3 h-3 rounded-full bg-secondary-fixed pulse-animation" style="animation-delay: 0.2s;"></div>
<div class="w-3 h-3 rounded-full bg-tertiary-container pulse-animation" style="animation-delay: 0.4s;"></div>
</div>
</main>
<!-- Background Illustrations (Decorative) -->
<div class="absolute inset-0 pointer-events-none opacity-20 overflow-hidden">
<span class="material-symbols-outlined absolute top-10 left-10 text-primary transform -rotate-12" style="font-size: 48px;">star</span>
<span class="material-symbols-outlined absolute top-20 right-20 text-secondary transform rotate-12" style="font-size: 56px;">redeem</span>
<span class="material-symbols-outlined absolute bottom-20 left-15 text-tertiary transform rotate-45" style="font-size: 40px;">leaderboard</span>
<span class="material-symbols-outlined absolute bottom-10 right-10 text-primary transform -rotate-6" style="font-size: 64px;">videogame_asset</span>
</div>
<!-- Micro-interaction for entering the app -->
<script>
        document.body.addEventListener('click', () => {
            // Visual feedback on click
            const main = document.querySelector('main');
            main.style.transition = 'transform 0.5s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.4s ease';
            main.style.transform = 'scale(0.95)';
            main.style.opacity = '0';
            
            setTimeout(() => {
                window.location.href = '../phone-login/index.html';
            }, 600);
        });
    </script>
<script src="../../shared/prototype-links.js"></script>
</body></html>
