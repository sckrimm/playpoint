<!DOCTYPE html>

<html lang="ka"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>PlayPoint - Profile Setup</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&family=Inter:wght@400;600&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&family=Montserrat:wght@100..900&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "secondary-fixed": "#6bff8f",
                    "inverse-primary": "#c0c1ff",
                    "error-container": "#ffdad6",
                    "on-error-container": "#93000a",
                    "on-surface": "#1a1c1c",
                    "surface": "#f9f9f9",
                    "on-secondary-container": "#007432",
                    "surface-dim": "#dadada",
                    "surface-container": "#eeeeee",
                    "surface-container-lowest": "#ffffff",
                    "on-secondary-fixed": "#002109",
                    "on-primary-fixed-variant": "#2f2ebe",
                    "secondary-container": "#6bff8f",
                    "on-tertiary": "#ffffff",
                    "on-primary-fixed": "#07006c",
                    "surface-bright": "#f9f9f9",
                    "inverse-surface": "#2f3131",
                    "primary": "#4648d4",
                    "on-primary": "#ffffff",
                    "primary-container": "#6063ee",
                    "tertiary": "#825100",
                    "on-secondary": "#ffffff",
                    "on-tertiary-fixed-variant": "#653e00",
                    "surface-container-highest": "#e2e2e2",
                    "surface-container-high": "#e8e8e8",
                    "on-tertiary-container": "#fffbff",
                    "secondary-fixed-dim": "#4ae176",
                    "surface-container-low": "#f3f3f3",
                    "tertiary-container": "#a36700",
                    "on-secondary-fixed-variant": "#005321",
                    "primary-fixed": "#e1e0ff",
                    "on-surface-variant": "#464554",
                    "outline-variant": "#c7c4d7",
                    "inverse-on-surface": "#f1f1f1",
                    "secondary": "#006e2f",
                    "background": "#f9f9f9",
                    "outline": "#767586",
                    "on-primary-container": "#fffbff",
                    "on-tertiary-fixed": "#2a1700",
                    "error": "#ba1a1a",
                    "tertiary-fixed": "#ffddb8",
                    "surface-tint": "#494bd6",
                    "on-error": "#ffffff",
                    "tertiary-fixed-dim": "#ffb95f",
                    "primary-fixed-dim": "#c0c1ff",
                    "on-background": "#1a1c1c",
                    "surface-variant": "#e2e2e2"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "16px",
                    "xl": "24px",
                    "full": "9999px"
            },
            "spacing": {
                    "md": "16px",
                    "xl": "32px",
                    "xs": "8px",
                    "base": "4px",
                    "container-margin": "20px",
                    "lg": "24px",
                    "gutter": "16px",
                    "sm": "12px"
            },
            "fontFamily": {
                    "display-lg": ["Montserrat"],
                    "headline-lg": ["Montserrat"],
                    "label-sm": ["Inter"],
                    "body-md": ["Inter"],
                    "headline-lg-mobile": ["Montserrat"],
                    "score-md": ["Montserrat"]
            },
            "fontSize": {
                    "display-lg": ["40px", {"lineHeight": "48px", "letterSpacing": "-0.02em", "fontWeight": "800"}],
                    "headline-lg": ["24px", {"lineHeight": "32px", "fontWeight": "700"}],
                    "label-sm": ["12px", {"lineHeight": "16px", "fontWeight": "600"}],
                    "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                    "headline-lg-mobile": ["20px", {"lineHeight": "28px", "fontWeight": "700"}],
                    "score-md": ["18px", {"lineHeight": "24px", "letterSpacing": "0.05em", "fontWeight": "700"}]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .active-scale:active {
            transform: scale(0.95);
        }
        .glass-tag {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .bento-glow {
            box-shadow: 0 4px 12px 0 rgba(70, 72, 212, 0.15);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface font-body-md min-h-screen flex flex-col items-center">
<!-- Top App Bar (As specified in JSON, modified for context) -->
<header class="flex justify-between items-center w-full px-container-margin py-md shadow-[0_2px_8px_0_rgba(0,0,0,0.05)] bg-surface sticky top-0 z-50">
<div class="flex items-center gap-sm">
<span class="font-display-lg text-headline-lg-mobile md:text-display-lg text-primary tracking-tight">PlayPoint</span>
</div>
<div class="flex items-center gap-xs">
<div class="px-sm py-xs bg-primary-container/10 rounded-full">
<span class="font-label-sm text-primary">პროფილის შექმნა</span>
</div>
</div>
</header>
<!-- Main Canvas -->
<main class="flex-1 w-full max-w-md px-container-margin py-xl flex flex-col">
<!-- Welcome Header -->
<section class="mb-xl text-center">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface mb-xs">მოგესალმებით!</h1>
<p class="font-body-md text-on-surface-variant">მოდი, შევქმნათ შენი სათამაშო პროფილი</p>
</section>
<!-- Profile Setup Bento-style Card -->
<div class="bg-surface-container-lowest rounded-xl p-xl bento-glow border border-outline-variant/30 space-y-xl relative overflow-hidden">
<!-- Animated decorative background elements -->
<div class="absolute -top-10 -right-10 w-32 h-32 bg-secondary-container/20 rounded-full blur-3xl"></div>
<div class="absolute -bottom-10 -left-10 w-40 h-40 bg-primary-container/10 rounded-full blur-3xl"></div>
<!-- Profile Photo Upload Section -->
<div class="flex flex-col items-center gap-md relative">
<div class="relative group">
<div class="w-32 h-32 rounded-full border-4 border-primary/10 p-1 bg-surface-container overflow-hidden transition-all duration-300 group-hover:border-primary/40 shadow-sm">
<div class="w-full h-full rounded-full bg-surface-variant flex items-center justify-center overflow-hidden" id="avatar-preview">
<span class="material-symbols-outlined text-outline text-[48px]">person</span>
</div>
</div>
<button class="absolute bottom-0 right-0 bg-primary text-on-primary w-10 h-10 rounded-full flex items-center justify-center shadow-lg hover:scale-105 active:scale-95 transition-transform border-4 border-surface-container-lowest" onclick="document.getElementById('photo-upload').click()">
<span class="material-symbols-outlined text-[20px]">add_a_photo</span>
</button>
<input accept="image/*" class="hidden" id="photo-upload" onchange="previewImage(this)" type="file"/>
</div>
<button class="text-primary font-label-sm hover:opacity-80 transition-opacity active-scale" onclick="skipPhoto()">
                    გამოტოვება
                </button>
</div>
<!-- Form Section -->
<div class="space-y-lg">
<div class="space-y-base">
<label class="block font-label-sm text-on-surface-variant ml-base" for="name-input">შენი სახელი</label>
<div class="relative group">
<input class="w-full h-14 bg-surface-container-low border-2 border-transparent rounded-lg px-md font-body-md focus:border-primary focus:bg-surface-container-lowest focus:ring-0 transition-all outline-none group-hover:bg-surface-container-high" id="name-input" placeholder="მაგ: გიორგი" type="text"/>
<span class="absolute right-md top-1/2 -translate-y-1/2 material-symbols-outlined text-outline group-focus-within:text-primary transition-colors">edit</span>
</div>
</div>
<!-- Simple Gamified Incentive Chip -->
<div class="flex items-center gap-sm p-sm bg-secondary-fixed/20 rounded-lg border border-secondary-fixed/30">
<span class="material-symbols-outlined text-on-secondary-container" style="font-variation-settings: 'FILL' 1;">stars</span>
<span class="font-label-sm text-on-secondary-container">პროფილის შევსებით მიიღებ 50 ქულას!</span>
</div>
</div>
</div>
<!-- Action Buttons -->
<div class="mt-auto pt-xl space-y-md">
<button class="w-full h-[48px] bg-primary text-on-primary font-bold rounded-lg shadow-[0_4px_12px_0_rgba(70,72,212,0.15)] flex items-center justify-center gap-sm active-scale transition-all hover:brightness-110" onclick="finishSetup()">
                დასრულება
                <span class="material-symbols-outlined text-[18px]">arrow_forward</span>
</button>
<p class="text-center font-label-sm text-outline-variant">ნებისმიერ დროს შეგიძლია შეცვალო პარამეტრებში</p>
</div>
</main>
<!-- Success Modal (Hidden) -->
<div class="fixed inset-0 z-[100] flex items-center justify-center px-container-margin hidden" id="success-modal">
<div class="absolute inset-0 bg-inverse-surface/40 backdrop-blur-sm"></div>
<div class="bg-surface-container-lowest w-full max-w-xs rounded-xl p-xl shadow-2xl relative z-10 text-center scale-90 opacity-0 transition-all duration-300" id="modal-content">
<div class="w-20 h-20 bg-secondary-fixed mx-auto rounded-full flex items-center justify-center mb-md bento-glow">
<span class="material-symbols-outlined text-on-secondary-fixed text-[40px]" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
<h2 class="font-headline-lg-mobile text-headline-lg-mobile mb-xs">მზად არის!</h2>
<p class="font-body-md text-on-surface-variant mb-lg">შენი პროფილი წარმატებით შეიქმნა</p>
<div class="w-full h-1 bg-surface-container rounded-full overflow-hidden">
<div class="h-full bg-primary w-0" id="progress-bar"></div>
</div>
</div>
</div>
<!-- Hidden visual decorative element -->
<div class="fixed bottom-0 left-0 w-full h-32 pointer-events-none overflow-hidden opacity-50">
<div class="absolute -bottom-16 -left-16 w-64 h-64 border-2 border-primary/5 rounded-full"></div>
<div class="absolute -bottom-8 right-12 w-24 h-24 border-2 border-secondary-fixed/10 rounded-full"></div>
</div>
<script>
        function previewImage(input) {
            const preview = document.getElementById('avatar-preview');
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    preview.innerHTML = `<img src="${e.target.result}" class="w-full h-full object-cover">`;
                    preview.classList.remove('bg-surface-variant');
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function skipPhoto() {
            const preview = document.getElementById('avatar-preview');
            preview.innerHTML = `<span class="material-symbols-outlined text-outline text-[48px]">person</span>`;
            preview.classList.add('bg-surface-variant');
            // Mock visual feedback
            console.log("Photo skipped");
        }

        function finishSetup() {
            const name = document.getElementById('name-input').value;
            const modal = document.getElementById('success-modal');
            const content = document.getElementById('modal-content');
            const progress = document.getElementById('progress-bar');

            modal.classList.remove('hidden');
            setTimeout(() => {
                content.classList.remove('scale-90', 'opacity-0');
                content.classList.add('scale-100', 'opacity-100');
            }, 10);

            // Simulating a "loading" progress then redirect
            progress.style.transition = "width 2s ease-in-out";
            setTimeout(() => {
                progress.style.width = "100%";
            }, 100);

            setTimeout(() => {
                // In a real app: window.location.href = '/dashboard';
                alert('პროფილი დასრულებულია: ' + (name || 'მომხმარებელი'));
                modal.classList.add('hidden');
            }, 2500);
        }

        // Simple animation on load
        window.addEventListener('DOMContentLoaded', () => {
            const container = document.querySelector('.bento-glow');
            container.style.opacity = '0';
            container.style.transform = 'translateY(20px)';
            setTimeout(() => {
                container.style.transition = 'all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
                container.style.opacity = '1';
                container.style.transform = 'translateY(0)';
            }, 100);
        });
    </script>
<script src="../../shared/prototype-links.js"></script>
</body></html>
