services:
  postgres:
    image: postgres:16-alpine
    container_name: playpoint-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: playpoint
      POSTGRES_USER: playpoint
      POSTGRES_PASSWORD: playpoint
    ports:
      - "5432:5432"
    volumes:
      - playpoint_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: playpoint-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - playpoint_redis_data:/data

volumes:
  playpoint_postgres_data:
  playpoint_redis_data:
